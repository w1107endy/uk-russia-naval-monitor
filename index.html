<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Russian Naval Activity Monitor — UK Waters</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>

  <!-- ═══ HEADER ════════════════════════════════════════════════ -->
  <div class="header">
    <div class="header-title">
      Russian Naval Activity Monitor<span>UK &amp; Adjacent Waters</span>
    </div>
    <div class="header-center">
      <button class="view-btn active" data-view="map" onclick="switchView('map')">Map</button>
      <button class="view-btn" data-view="timeline" onclick="switchView('timeline')">Timeline</button>
    </div>
    <div class="header-actions">
      <button class="btn" onclick="toggleSidebar()" title="Toggle sidebar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
        Panel
      </button>
      <button class="btn" onclick="exportPNG(2)" title="Export at 2x resolution">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12l7 7 7-7"/></svg>
        PNG 2x
      </button>
      <button class="btn btn-primary" onclick="exportPNG(3)" title="Export at 3x resolution (high-res)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12l7 7 7-7"/></svg>
        PNG 3x
      </button>
    </div>
  </div>

  <!-- ═══ APP BODY ══════════════════════════════════════════════ -->
  <div class="app">

    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
      <!-- Filters -->
      <div class="sb-section">
        <div class="sb-header" onclick="this.nextElementSibling.classList.toggle('hidden')">
          <h3>Filter by type</h3>
        </div>
        <div class="sb-body" id="filter-body"></div>
      </div>

      <!-- Incidents -->
      <div class="sb-section" style="flex:1;display:flex;flex-direction:column;overflow:hidden">
        <div class="sb-header">
          <h3>Incidents</h3>
          <span class="badge" id="incident-count">0</span>
        </div>
        <div class="sb-body incident-list" id="incident-list" style="flex:1"></div>
      </div>

      <!-- News Feed -->
      <div class="sb-section" style="flex:1;display:flex;flex-direction:column;overflow:hidden">
        <div class="sb-header">
          <h3>News Feed</h3>
          <span class="badge auto-badge" id="feed-badge">AUTO</span>
        </div>
        <div class="sb-body" style="flex:1;display:flex;flex-direction:column;overflow:hidden">
          <div class="feed-controls">
            <button class="btn" onclick="fetchNews()" style="padding:4px 10px;font-size:10px">Refresh</button>
            <select id="feed-interval" onchange="setFeedInterval(this.value)" style="font-size:10px;padding:3px 6px;border:1px solid var(--border);border-radius:3px">
              <option value="900000">15 min</option>
              <option value="1800000" selected>30 min</option>
              <option value="3600000">1 hr</option>
              <option value="0">Off</option>
            </select>
            <span class="feed-status" id="feed-status">Ready</span>
          </div>
          <div class="news-list" id="news-list" style="flex:1"></div>
          <button class="btn" style="margin-top:8px;justify-content:center;width:100%" onclick="openModal()">+ Add Incident</button>
        </div>
      </div>
    </div>

    <!-- Main content -->
    <div class="main" id="main-content">
      <div id="map-view"><div id="map-container"></div></div>
      <div id="timeline-view"></div>
    </div>

  </div>

  <!-- ═══ ADD INCIDENT MODAL ════════════════════════════════════ -->
  <div class="modal-overlay" id="modal">
    <div class="modal">
      <h2>Add New Incident</h2>
      <div class="form-row"><label>Case ID</label><input id="f-id" placeholder="e.g. UKRUS-2607"></div>
      <div class="form-row"><label>Date</label><input id="f-date" type="date"></div>
      <div class="form-row"><label>Category</label>
        <select id="f-cat">
          <option value="surface">Surface warship transit</option>
          <option value="submarine">Submarine transit</option>
          <option value="intel">Intelligence / spy vessel</option>
          <option value="infra">Subsea infrastructure surveillance</option>
          <option value="escort">Escort / logistics convoy</option>
          <option value="coercive">Coercive / escalatory act</option>
        </select>
      </div>
      <div class="form-row"><label>Latitude</label><input id="f-lat" type="number" step="0.01" placeholder="e.g. 51.0"></div>
      <div class="form-row"><label>Longitude</label><input id="f-lng" type="number" step="0.01" placeholder="e.g. 1.3"></div>
      <div class="form-row"><label>Russian assets</label><input id="f-assets" placeholder="e.g. Frigate Admiral Gorshkov"></div>
      <div class="form-row"><label>Area</label><input id="f-area" placeholder="e.g. English Channel"></div>
      <div class="form-row"><label>UK / Allied response</label><input id="f-response" placeholder="e.g. HMS Portland tracked the group"></div>
      <div class="form-row"><label>Analytic note</label><textarea id="f-note" placeholder="Brief analysis..."></textarea></div>
      <div class="form-actions">
        <button class="btn" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="addIncident()">Add</button>
      </div>
    </div>
  </div>

  <!-- ═══ EXPORT OVERLAY ════════════════════════════════════════ -->
  <div class="export-overlay" id="export-overlay">
    <div class="export-spinner"></div>
    <div class="export-text">Rendering high-resolution image...</div>
  </div>

  <!-- ═══ APP SCRIPT ════════════════════════════════════════════ -->
  <script src="js/app.js"></script>

</body>
</html>
